version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-workspace-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aiworkspace

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: